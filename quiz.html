<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprechübung — DeutschWeg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep: #0a5c42; --green-mid: #1D9E75; --green-light: #5DCAA5;
      --green-pale: #E1F5EE; --green-border: #9FE1CB;
      --text-dark: #1a1a18; --text-mid: #4a4a46; --text-muted: #888780;
      --bg-page: #f5f3ed; --bg-card: #ffffff; --bg-section: #fafaf7;
      --border: rgba(0,0,0,0.09);
      --serif: 'Fraunces', Georgia, serif; --sans: 'DM Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg-page); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 18s ease-in-out infinite alternate; }
    .aurora-blob:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, #1D9E75, transparent 70%); top: -150px; left: -150px; animation-duration: 20s; }
    .aurora-blob:nth-child(2) { width: 500px; height: 500px; background: radial-gradient(circle, #5DCAA5, transparent 70%); top: 30%; right: -100px; animation-duration: 25s; animation-delay: -8s; }
    .aurora-blob:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, #7C5CFC, transparent 70%); bottom: -100px; left: 30%; animation-duration: 22s; animation-delay: -4s; opacity: 0.10; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.08); } }

    .page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--text-mid); text-decoration: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; margin-bottom: 2rem; transition: border-color 0.18s, box-shadow 0.18s; }
    .back-link:hover { border-color: var(--green-mid); box-shadow: 0 2px 8px rgba(10,92,66,0.08); }

    .hero { text-align: center; margin-bottom: 2rem; }
    .hero-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 0.5rem; }
    .hero-title { font-family: var(--serif); font-size: clamp(26px, 6vw, 40px); font-weight: 300; line-height: 1.15; }
    .hero-title em { font-style: italic; color: var(--green-deep); }

    /* tabs */
    .tabs { display: flex; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 5px; margin-bottom: 1.6rem; }
    .tab-btn { flex: 1; font-family: var(--sans); font-size: 14px; font-weight: 600; border: none; border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: background 0.18s, color 0.18s; background: none; color: var(--text-muted); }
    .tab-btn.active { background: var(--green-mid); color: #fff; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── TAB 1: ALL QUESTIONS ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
    .toolbar-hint { font-size: 13px; color: var(--text-muted); }
    .btn-shuffle-all { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--green-deep); background: var(--green-pale); border: 1.5px solid var(--green-border); border-radius: 10px; padding: 7px 14px; cursor: pointer; transition: background 0.18s; }
    .btn-shuffle-all:hover { background: var(--green-border); }

    .q-list { display: flex; flex-direction: column; gap: 8px; }
    .q-item { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .q-num { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 20px; text-align: right; flex-shrink: 0; }
    .q-text { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--text-dark); flex: 1; line-height: 1.35; }
    .q-text.swapped { animation: pop 0.3s ease both; }
    @keyframes pop { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .btn-swap { flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg-section); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: border-color 0.18s, background 0.18s, transform 0.15s; }
    .btn-swap:hover { border-color: var(--green-mid); background: var(--green-pale); transform: rotate(20deg); }

    /* ── TAB 2: PRACTICE ── */
    .p-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.8rem; }
    .p-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s, transform 0.3s; }
    .p-dot.active { background: var(--green-mid); transform: scale(1.3); }
    .p-dot.done { background: var(--green-light); }

    .p-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 3rem 2rem 2.5rem; box-shadow: 0 4px 28px rgba(0,0,0,0.07); text-align: center; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .p-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.4rem; }
    .p-question { font-family: var(--serif); font-size: clamp(24px, 5vw, 34px); font-weight: 400; color: var(--text-dark); line-height: 1.35; margin-bottom: 2.5rem; }

    .p-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .btn-prev { font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--text-mid); background: var(--bg-section); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 20px; cursor: pointer; transition: border-color 0.18s; }
    .btn-prev:hover { border-color: var(--green-mid); }
    .btn-prev:disabled { opacity: 0.3; cursor: default; }
    .p-counter { font-size: 13px; color: var(--text-muted); }
    .btn-pnext { font-family: var(--sans); font-size: 15px; font-weight: 700; color: #fff; background: var(--green-mid); border: none; border-radius: 12px; padding: 12px 28px; cursor: pointer; transition: background 0.18s, transform 0.12s; }
    .btn-pnext:hover { background: var(--green-deep); }
    .btn-pnext:active { transform: scale(0.97); }

    /* new round btn below card */
    .p-new-round { text-align: center; margin-top: 1rem; }
    .btn-new-round { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--text-muted); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .btn-new-round:hover { color: var(--text-mid); }

    /* done */
    .p-done { display: none; text-align: center; }
    .p-done.visible { display: block; }
    .p-done-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 3rem 2rem; }
    .p-done-emoji { font-size: 60px; margin-bottom: 1rem; }
    .p-done-title { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text-dark); margin-bottom: 0.4rem; }
    .p-done-title em { font-style: italic; color: var(--green-deep); }
    .p-done-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; }
    .btn-again { font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; background: var(--green-mid); border: none; border-radius: 12px; padding: 13px 28px; cursor: pointer; transition: background 0.18s; }
    .btn-again:hover { background: var(--green-deep); }

    .btn-swap-q { font-size: 16px; width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg-section); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.18s, background 0.18s, transform 0.15s; }
    .btn-swap-q:hover { border-color: var(--green-mid); background: var(--green-pale); transform: rotate(20deg); }

    @media (max-width: 480px) { .q-text { font-size: 15px; } }
  </style>
</head>
<body>
<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="page">
  <a href="index.html" class="back-link">← DeutschWeg</a>

  <div class="hero">
    <div class="hero-label">Sprechübung</div>
    <h1 class="hero-title">Stell dich <em>vor!</em></h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabBtn1" onclick="switchTab(1)">Alle Fragen (40)</button>
    <button class="tab-btn" id="tabBtn2" onclick="switchTab(2)">Meine 5 Fragen</button>
  </div>

  <!-- TAB 1 -->
  <div class="tab-panel active" id="tab1">
    <div class="toolbar">
      <span class="toolbar-hint">Натисни 🔀 щоб змінити питання</span>
      <button class="btn-shuffle-all" onclick="shuffleAll()">🔀 Перемішати все</button>
    </div>
    <div class="q-list" id="qList"></div>
  </div>

  <!-- TAB 2 -->
  <div class="tab-panel" id="tab2">
    <div id="practiceWrap">
      <div class="p-dots" id="pDots"></div>
      <div class="p-card" id="pCard">
        <div class="p-label" style="display:flex;align-items:center;justify-content:space-between;">
          <span>Frage <span id="pNum">1</span> von 5</span>
          <button class="btn-swap-q" onclick="swapCurrent()" title="Нове питання">🔀</button>
        </div>
        <div class="p-question" id="pQuestion"></div>
        <div class="p-nav">
          <button class="btn-prev" id="btnPrev" onclick="prevQ()" disabled>← Назад</button>
          <span class="p-counter" id="pCounter">1 / 5</span>
          <button class="btn-pnext" id="btnPNext" onclick="nextQ()">Weiter →</button>
        </div>
      </div>
      <div class="p-new-round">
        <button class="btn-new-round" onclick="newRound()">🔀 Нові 5 питань</button>
      </div>
    </div>

    <div class="p-done" id="pDone">
      <div class="p-done-card">
        <div class="p-done-emoji">🎉</div>
        <div class="p-done-title">Gut <em>gemacht!</em></div>
        <div class="p-done-sub">Усі 5 питань пройдено</div>
        <button class="btn-again" onclick="newRound()">Нові 5 питань ↺</button>
      </div>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  "Wie heißt du?",
  "Woher kommst du?",
  "Wo wohnst du gerade?",
  "Wie alt bist du?",
  "Was machst du beruflich?",
  "Was studierst du?",
  "Was sind deine Hobbys?",
  "Was machst du in deiner Freizeit?",
  "Hast du Geschwister?",
  "Wie ist deine Familie?",
  "Hast du Haustiere?",
  "Was ist dein Lieblingsessen?",
  "Was trinkst du am liebsten?",
  "Welche Musik magst du?",
  "Was ist dein Lieblingsfilm oder deine Lieblingsserie?",
  "Liest du gern? Was liest du?",
  "Machst du Sport? Welchen?",
  "Wohin reist du gern?",
  "Welche Länder hast du schon besucht?",
  "Was magst du an Deutschland?",
  "Warum lernst du Deutsch?",
  "Seit wann lernst du Deutsch?",
  "Welche Sprachen sprichst du?",
  "Lebst du alleine oder mit jemandem zusammen?",
  "Was ist deine Lieblingsstadt?",
  "Bist du eher introvertiert oder extrovertiert?",
  "Was ist dir im Leben wichtig?",
  "Hast du einen Traumjob? Was ist das?",
  "Was willst du in Zukunft machen?",
  "Was machst du am Wochenende?",
  "Kochst du gern? Was kochst du?",
  "Was schaust du gern im Internet?",
  "Bist du verheiratet oder hast du einen Partner / eine Partnerin?",
  "Wie sieht dein typischer Tag aus?",
  "Wo bist du aufgewachsen?",
  "Was nervt dich?",
  "Was macht dich glücklich?",
  "Hast du eine beste Freundin oder einen besten Freund?",
  "Was hast du gestern gemacht?",
  "Was planst du für dieses Jahr?",
];

let displayed = [...Array(ALL_QUESTIONS.length).keys()];
let practiceList = [];
let practiceIdx = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── TAB 1 ──
function renderList() {
  const list = document.getElementById('qList');
  list.innerHTML = '';
  displayed.forEach((qi, pos) => {
    const item = document.createElement('div');
    item.className = 'q-item';
    item.innerHTML = `
      <span class="q-num">${pos + 1}</span>
      <span class="q-text" id="qt-${pos}">${ALL_QUESTIONS[qi]}</span>
      <button class="btn-swap" onclick="swapOne(${pos})" title="Нове питання">🔀</button>
    `;
    list.appendChild(item);
  });
}

function swapOne(pos) {
  const usedSet = new Set(displayed);
  const pool = ALL_QUESTIONS.map((_, i) => i).filter(i => !usedSet.has(i));
  let newIdx;
  if (pool.length > 0) {
    newIdx = pool[Math.floor(Math.random() * pool.length)];
  } else {
    const cur = displayed[pos];
    newIdx = ALL_QUESTIONS.map((_, i) => i).filter(i => i !== cur)[Math.floor(Math.random() * 39)];
  }
  displayed[pos] = newIdx;
  const el = document.getElementById('qt-' + pos);
  el.textContent = ALL_QUESTIONS[newIdx];
  el.className = 'q-text swapped';
  setTimeout(() => el.classList.remove('swapped'), 400);
}

function shuffleAll() {
  displayed = shuffle([...Array(ALL_QUESTIONS.length).keys()]);
  renderList();
}

// ── TAB 2 ──
function newRound() {
  practiceList = shuffle([...ALL_QUESTIONS]).slice(0, 5);
  practiceIdx = 0;
  document.getElementById('practiceWrap').style.display = '';
  document.getElementById('pDone').classList.remove('visible');
  buildPDots();
  renderPractice();
}

function buildPDots() {
  const wrap = document.getElementById('pDots');
  wrap.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'p-dot';
    d.id = 'pdot' + i;
    wrap.appendChild(d);
  }
}

function renderPractice() {
  const i = practiceIdx;
  document.getElementById('pQuestion').textContent = practiceList[i];
  document.getElementById('pNum').textContent = i + 1;
  document.getElementById('pCounter').textContent = `${i + 1} / 5`;
  document.getElementById('btnPrev').disabled = i === 0;
  document.getElementById('btnPNext').textContent = i === 4 ? 'Fertig ✓' : 'Weiter →';
  for (let j = 0; j < 5; j++) {
    document.getElementById('pdot' + j).className =
      'p-dot' + (j === i ? ' active' : j < i ? ' done' : '');
  }
  const card = document.getElementById('pCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.3s ease both';
}

function nextQ() {
  if (practiceIdx < 4) {
    practiceIdx++;
    renderPractice();
  } else {
    document.getElementById('practiceWrap').style.display = 'none';
    document.getElementById('pDone').classList.add('visible');
  }
}

function prevQ() {
  if (practiceIdx > 0) { practiceIdx--; renderPractice(); }
}

function swapCurrent() {
  const usedSet = new Set(practiceList);
  const pool = ALL_QUESTIONS.filter(q => !usedSet.has(q));
  const newQ = pool.length > 0
    ? pool[Math.floor(Math.random() * pool.length)]
    : ALL_QUESTIONS.filter(q => q !== practiceList[practiceIdx])[Math.floor(Math.random() * 39)];
  practiceList[practiceIdx] = newQ;
  const el = document.getElementById('pQuestion');
  el.style.animation = 'none';
  void el.offsetWidth;
  el.textContent = newQ;
  el.style.animation = 'fadeUp 0.3s ease both';
}

function switchTab(n) {
  document.getElementById('tab1').classList.toggle('active', n === 1);
  document.getElementById('tab2').classList.toggle('active', n === 2);
  document.getElementById('tabBtn1').classList.toggle('active', n === 1);
  document.getElementById('tabBtn2').classList.toggle('active', n === 2);
  if (n === 2 && practiceList.length === 0) newRound();
}

// init
renderList();
newRound();
</script>
</body>
</html>
