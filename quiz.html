<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprechübung — DeutschWeg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep: #0a5c42; --green-mid: #1D9E75; --green-light: #5DCAA5;
      --green-pale: #E1F5EE; --green-border: #9FE1CB;
      --text-dark: #1a1a18; --text-mid: #4a4a46; --text-muted: #888780;
      --bg-page: #f5f3ed; --bg-card: #ffffff; --bg-section: #fafaf7;
      --border: rgba(0,0,0,0.09);
      --serif: 'Fraunces', Georgia, serif; --sans: 'DM Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg-page); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 18s ease-in-out infinite alternate; }
    .aurora-blob:nth-child(1) { width: 600px; height: 600px; background: radial-gradient(circle, #1D9E75, transparent 70%); top: -150px; left: -150px; animation-duration: 20s; }
    .aurora-blob:nth-child(2) { width: 500px; height: 500px; background: radial-gradient(circle, #5DCAA5, transparent 70%); top: 30%; right: -100px; animation-duration: 25s; animation-delay: -8s; }
    .aurora-blob:nth-child(3) { width: 400px; height: 400px; background: radial-gradient(circle, #7C5CFC, transparent 70%); bottom: -100px; left: 30%; animation-duration: 22s; animation-delay: -4s; opacity: 0.10; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.08); } }

    .page { position: relative; z-index: 1; max-width: 580px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--text-mid); text-decoration: none; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; margin-bottom: 2rem; transition: border-color 0.18s, box-shadow 0.18s; }
    .back-link:hover { border-color: var(--green-mid); box-shadow: 0 2px 8px rgba(10,92,66,0.08); }

    .hero { text-align: center; margin-bottom: 2.5rem; }
    .hero-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 0.5rem; }
    .hero-title { font-family: var(--serif); font-size: clamp(26px, 6vw, 40px); font-weight: 300; line-height: 1.15; }
    .hero-title em { font-style: italic; color: var(--green-deep); }
    .hero-sub { font-size: 15px; color: var(--text-muted); margin-top: 0.6rem; }

    .progress-wrap { margin-bottom: 1.6rem; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .progress-bar { height: 5px; background: #ddd; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green-mid); border-radius: 99px; transition: width 0.5s ease; }

    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 2rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s, transform 0.3s; }
    .dot.active { background: var(--green-mid); transform: scale(1.3); }
    .dot.done { background: var(--green-light); }

    .q-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 2.5rem 2rem; box-shadow: 0 4px 28px rgba(0,0,0,0.07); text-align: center; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    .q-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.4rem; }
    .q-text { font-family: var(--serif); font-size: clamp(24px, 5vw, 34px); font-weight: 400; color: var(--text-dark); line-height: 1.35; margin-bottom: 2.5rem; }

    .btn-next { font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; background: var(--green-mid); border: none; border-radius: 12px; padding: 14px 36px; cursor: pointer; transition: background 0.18s, transform 0.12s; }
    .btn-next:hover { background: var(--green-deep); }
    .btn-next:active { transform: scale(0.97); }

    /* done screen */
    .done-screen { display: none; text-align: center; animation: fadeUp 0.4s ease both; }
    .done-screen.visible { display: block; }
    .done-emoji { font-size: 60px; margin-bottom: 1rem; }
    .done-title { font-family: var(--serif); font-size: 30px; font-weight: 300; color: var(--text-dark); margin-bottom: 0.4rem; }
    .done-title em { font-style: italic; color: var(--green-deep); }
    .done-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; }
    .done-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-restart { font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; background: var(--green-mid); border: none; border-radius: 12px; padding: 14px 28px; cursor: pointer; transition: background 0.18s; }
    .btn-restart:hover { background: var(--green-deep); }
    .btn-home { font-family: var(--sans); font-size: 15px; font-weight: 500; color: var(--text-mid); background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 28px; text-decoration: none; display: inline-block; transition: border-color 0.18s; }
    .btn-home:hover { border-color: var(--green-mid); }
  </style>
</head>
<body>
<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="page">
  <a href="index.html" class="back-link">← DeutschWeg</a>

  <div class="hero">
    <div class="hero-label">Sprechübung</div>
    <h1 class="hero-title">Stell dich <em>vor!</em></h1>
    <p class="hero-sub">Відповідай вголос по-німецьки</p>
  </div>

  <div id="quizWrap">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressLabel">Frage 1 von 5</span>
        <span id="progressCount">1 / 5</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="dots" id="dots"></div>

    <div class="q-card" id="qCard">
      <div class="q-tag">Frage</div>
      <div class="q-text" id="qText"></div>
      <button class="btn-next" onclick="nextQuestion()">Weiter →</button>
    </div>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-emoji">🎉</div>
    <div class="done-title">Gut <em>gemacht!</em></div>
    <div class="done-sub">5 Fragen geschafft</div>
    <div class="done-actions">
      <button class="btn-restart" onclick="startQuiz()">Neue Runde ↺</button>
      <a href="index.html" class="btn-home">← Zurück</a>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  "Wie heißt du?",
  "Woher kommst du?",
  "Wo wohnst du gerade?",
  "Wie alt bist du?",
  "Was machst du beruflich?",
  "Was studierst du?",
  "Was sind deine Hobbys?",
  "Was machst du in deiner Freizeit?",
  "Hast du Geschwister?",
  "Wie ist deine Familie?",
  "Hast du Haustiere?",
  "Was ist dein Lieblingsessen?",
  "Was trinkst du am liebsten?",
  "Welche Musik magst du?",
  "Was ist dein Lieblingsfilm oder deine Lieblingsserie?",
  "Liest du gern? Was liest du?",
  "Machst du Sport? Welchen?",
  "Wohin reist du gern?",
  "Welche Länder hast du schon besucht?",
  "Was magst du an Deutschland?",
  "Warum lernst du Deutsch?",
  "Seit wann lernst du Deutsch?",
  "Welche Sprachen sprichst du?",
  "Lebst du alleine oder mit jemandem zusammen?",
  "Was ist deine Lieblingsstadt?",
  "Bist du eher introvertiert oder extrovertiert?",
  "Was ist dir im Leben wichtig?",
  "Hast du einen Traumjob? Was ist das?",
  "Was willst du in Zukunft machen?",
  "Was machst du am Wochenende?",
  "Kochst du gern? Was kochst du?",
  "Was schaust du gern im Internet?",
  "Bist du verheiratet oder hast du einen Partner / eine Partnerin?",
  "Wie sieht dein typischer Tag aus?",
  "Wo bist du aufgewachsen?",
  "Was nervt dich?",
  "Was macht dich glücklich?",
  "Hast du eine beste Freundin oder einen besten Freund?",
  "Was hast du gestern gemacht?",
  "Was planst du für dieses Jahr?",
];

const PER_ROUND = 5;
let session = [];
let current = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  session = shuffle(ALL_QUESTIONS).slice(0, PER_ROUND);
  current = 0;
  document.getElementById('quizWrap').style.display = '';
  document.getElementById('doneScreen').classList.remove('visible');
  buildDots();
  renderQuestion();
}

function buildDots() {
  const wrap = document.getElementById('dots');
  wrap.innerHTML = '';
  for (let i = 0; i < PER_ROUND; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot' + i;
    wrap.appendChild(d);
  }
}

function renderQuestion() {
  document.getElementById('progressLabel').textContent = `Frage ${current + 1} von ${PER_ROUND}`;
  document.getElementById('progressCount').textContent = `${current + 1} / ${PER_ROUND}`;
  document.getElementById('progressFill').style.width = `${(current / PER_ROUND) * 100}%`;

  for (let i = 0; i < PER_ROUND; i++) {
    document.getElementById('dot' + i).className =
      'dot' + (i === current ? ' active' : i < current ? ' done' : '');
  }

  document.getElementById('qText').textContent = session[current];

  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.35s ease both';
}

function nextQuestion() {
  document.getElementById('dot' + current).className = 'dot done';

  if (current < PER_ROUND - 1) {
    current++;
    renderQuestion();
  } else {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('quizWrap').style.display = 'none';
    document.getElementById('doneScreen').classList.add('visible');
  }
}

startQuiz();
</script>
</body>
</html>
