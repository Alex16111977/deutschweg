<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meine Antworten · DeutschWeg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF7;
      --bg-soft: #F0EEE4;
      --surface: #FFFFFF;
      --ink: #0B0B0A;
      --ink-soft: #2A2A26;
      --muted: #6D6D65;
      --border: #0B0B0A;
      --lime: #C4F83C;
      --pink: #FF3B8A;
      --blue: #2D5EFF;
      --sun:  #FFD60A;
      --mint: #7CE8B7;
      --peach:#FFB38A;
      --lilac:#C9B8FF;
      --shadow-hard: 6px 6px 0 var(--border);
      --shadow-soft: 3px 3px 0 var(--border);
      --radius-sm: 10px;
      --radius: 18px;
      --radius-lg: 28px;
      --sans: 'Inter', system-ui, sans-serif;
      --display: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    [data-theme="dark"] {
      --bg: #0E0E0C;
      --bg-soft: #1A1A17;
      --surface: #18181A;
      --ink: #F6F6F2;
      --ink-soft: #E8E8E2;
      --muted: #A3A39A;
      --border: #F6F6F2;
      --shadow-hard: 6px 6px 0 rgba(246,246,242,0.22);
      --shadow-soft: 3px 3px 0 rgba(246,246,242,0.22);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--ink) 1px, transparent 1px),
        linear-gradient(90deg, var(--ink) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .035;
      z-index: 0;
    }
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* THEME SWITCH */
    .theme-switch {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--shadow-soft);
      width: fit-content;
      margin-left: auto;
    }
    .theme-btn {
      width: 32px; height: 32px;
      border: 0; background: transparent;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      color: var(--ink);
      transition: background .15s;
    }
    .theme-btn.active { background: var(--ink); color: var(--bg); }

    /* HERO */
    .hero {
      background: var(--lilac);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px 28px;
      box-shadow: var(--shadow-hard);
      margin: 18px 0 28px;
      position: relative;
      overflow: hidden;
    }
    .hero-label {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--ink);
      margin-bottom: 12px;
      display: inline-block;
    }
    .hero h1 {
      font-family: var(--display);
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--pink);
    }
    .hero p {
      font-size: 16px;
      color: var(--ink-soft);
      max-width: 540px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .stat-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat-pill {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--ink);
    }
    .stat-pill b {
      font-family: var(--display);
      font-weight: 700;
      color: var(--pink);
    }

    /* PROGRESS */
    .progress-wrap {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: 999px;
      height: 16px;
      margin-bottom: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .progress-bar {
      height: 100%;
      background: var(--mint);
      border-right: 2px solid var(--border);
      border-radius: 999px 0 0 999px;
      transition: width 0.4s cubic-bezier(.22,1,.36,1);
    }
    .progress-label {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
      margin-bottom: 22px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .ctrl-btn:hover {
      transform: translate(-2px,-2px);
      box-shadow: 5px 5px 0 var(--border);
      background: var(--lime);
    }
    .ctrl-btn.active {
      background: var(--ink);
      color: var(--bg);
    }
    .search-box {
      flex: 1;
      min-width: 180px;
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      box-shadow: var(--shadow-soft);
    }
    .search-box:focus {
      box-shadow: 5px 5px 0 var(--border);
      transform: translate(-1px,-1px);
    }

    /* QUESTION CARD */
    .q-card {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      transition: transform .15s, box-shadow .15s, background .2s;
    }
    .q-card:hover {
      transform: translate(-2px,-2px);
      box-shadow: 6px 6px 0 var(--border);
    }
    .q-card.learned {
      background: var(--mint);
    }
    .q-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      cursor: pointer;
      user-select: none;
    }
    .q-num {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      min-width: 26px;
      text-align: right;
      flex-shrink: 0;
    }
    .q-card.learned .q-num { color: var(--ink); }
    .q-texts { flex: 1; min-width: 0; }
    .q-de {
      font-family: var(--display);
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .q-ru {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--muted);
    }
    .q-card.learned .q-ru { color: var(--ink-soft); }
    .q-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-learned {
      width: 36px; height: 36px;
      font-size: 16px;
      background: var(--bg-soft);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      line-height: 1;
      transition: background .15s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-learned:hover {
      background: var(--sun);
      transform: scale(1.08);
    }
    .q-card.learned .btn-learned {
      background: var(--ink);
      color: var(--bg);
    }
    .q-arrow {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--ink);
      transition: transform 0.25s;
      width: 28px;
      text-align: center;
    }
    .q-card.open .q-arrow { transform: rotate(180deg); }

    /* ANSWERS PANEL */
    .q-answers {
      display: none;
      padding: 4px 18px 18px 58px;
      background: var(--bg-soft);
      border-top: 2px dashed var(--border);
    }
    .q-card.learned .q-answers {
      background: rgba(255,255,255,0.4);
    }
    .q-card.open .q-answers { display: block; padding-top: 16px; }
    .answers-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .answer-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .answer-item:hover {
      background: var(--sun);
      transform: translate(-1px,-1px);
    }
    .answer-item.picked {
      background: var(--mint);
    }
    .ans-letter {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--pink);
      min-width: 20px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .answer-item.picked .ans-letter { color: var(--ink); }
    .ans-texts { flex: 1; }
    .ans-de {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 2px;
      line-height: 1.35;
    }
    .ans-ru {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--muted);
    }
    .answer-item.picked .ans-ru { color: var(--ink-soft); }

    /* STATS */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--surface);
      border: 2.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .stat:nth-child(1) { background: var(--peach); }
    .stat:nth-child(2) { background: var(--mint); }
    .stat:nth-child(3) { background: var(--sun); }
    .stat-num {
      font-family: var(--display);
      font-size: 30px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-soft);
      margin-top: 4px;
      letter-spacing: .04em;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      font-family: var(--display);
      font-size: 15px;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .page { padding: 20px 14px 60px; }
      .hero { padding: 26px 20px 22px; }
      .q-de { font-size: 15px; }
      .q-answers { padding-left: 18px; padding-right: 14px; }
      .ans-de { font-size: 14px; }
      .stat-num { font-size: 22px; }
    }
  </style>
</head>

  </div>

  <div id="cardList"></div>

</div>

    answers: [

];

let learnedSet = new Set(JSON.parse(localStorage.getItem('dw_learned') || '[]'));
let currentFilter = 'all';

function saveState() {
  localStorage.setItem('dw_learned', JSON.stringify([...learnedSet]));
}

function toggleLearned(idx) {
  if (learnedSet.has(idx)) learnedSet.delete(idx);
  else learnedSet.add(idx);
  saveState();
  renderAll();
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  if (card) card.classList.toggle('open');
}

function pickAnswer(cardIdx, ansIdx) {
  document.querySelectorAll(`#card-${cardIdx} .answer-item`).forEach((el, i) => {
    el.classList.toggle('picked', i === ansIdx);
  });
}

function renderAll() {
  const list = document.getElementById('cardList');
  const query = document.getElementById('searchInput').value.toLowerCase();
  list.innerHTML = '';
  let shown = 0;
  DATA.forEach((item, idx) => {
    const isLearned = learnedSet.has(idx);
    if (currentFilter === 'done' && !isLearned) return;
    if (currentFilter === 'open' && isLearned) return;
    if (query && !item.de.toLowerCase().includes(query) && !item.ru.toLowerCase().includes(query)) return;

    shown++;
    const card = document.createElement('div');
    card.className = 'q-card' + (isLearned ? ' learned' : '');
    card.id = 'card-' + idx;

    const answers = item.answers.map((a, ai) => `
      <div class="answer-item" onclick="pickAnswer(${idx},${ai})">
        <span class="ans-letter">${String.fromCharCode(65+ai)}.</span>
        <div class="ans-texts">
          <div class="ans-de">${a.de}</div>
          <div class="ans-ru">${a.ru}</div>
        </div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="q-header" onclick="toggleCard(${idx})">
        <span class="q-num">${String(idx+1).padStart(2,'0')}</span>
        <div class="q-texts">
          <div class="q-de">${item.de}</div>
          <div class="q-ru">${item.ru}</div>
        </div>
        <div class="q-right">
          <button class="btn-learned" onclick="event.stopPropagation();toggleLearned(${idx})" title="Выучено">
            ${isLearned ? '✓' : '○'}
          </button>
          <span class="q-arrow">▼</span>
        </div>
      </div>
      <div class="q-answers">
        <div class="answers-label">5 Varianten</div>
        ${answers}
      </div>
    `;
    list.appendChild(card);
  });

  if (shown === 0) {
    list.innerHTML = '<div class="empty">Ничего не найдено 🔍</div>';
  }

  updateStats();
}

function updateStats() {
  const total = DATA.length;
  const learned = learnedSet.size;
  const left = total - learned;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statLearned').textContent = learned;
  document.getElementById('statLeft').textContent = left;
  const pct = Math.round((learned / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('pctLabel').textContent = pct + '%';
}

function setFilter(f) {
  currentFilter = f;
  ['btnAll','btnOpen','btnDone'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(f === 'all' ? 'btnAll' : f === 'open' ? 'btnOpen' : 'btnDone').classList.add('active');
  renderAll();
}

function filterCards() { renderAll(); }

function expandAll() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('open'));
}

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.body.dataset.theme = btn.dataset.t;
    localStorage.setItem('dw_theme', btn.dataset.t);
  });
});
const savedTheme = localStorage.getItem('dw_theme');
if (savedTheme) {
  document.body.dataset.theme = savedTheme;
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t === savedTheme);
  });
}

renderAll();
</script>
